<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>User Dashboard</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f6f9;
}

header{
background:#3498db;
color:white;
padding:15px;
text-align:center;
font-size:24px;
}

.container{
padding:40px;
}

.card{
background:white;
padding:30px;
margin-bottom:20px;
border-radius:8px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

</style>

</head>

<body>

<header>
User Dashboard
</header>

<div class="container">

<div class="card">
<h3>Welcome User</h3>
<p>You have successfully logged in.</p>
</div>

<div class="card">
<h3>My Orders</h3>
<p>View your order history.</p>
</div>

<div class="card">
<h3>Profile Settings</h3>
<p>Update your personal information.</p>
</div>

</div>

</body>

</html>
