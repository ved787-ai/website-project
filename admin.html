<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f6f9;
}

header{
background:#2c3e50;
color:white;
padding:15px;
text-align:center;
font-size:24px;
}

.container{
padding:40px;
}

.card{
background:white;
padding:30px;
margin-bottom:20px;
border-radius:8px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

</style>

</head>

<body>

<header>
Admin Dashboard
</header>

<div class="container">

<div class="card">
<h3>Welcome Admin</h3>
<p>You have successfully logged in.</p>
</div>

<div class="card">
<h3>Manage Users</h3>
<p>View and manage system users.</p>
</div>

<div class="card">
<h3>System Reports</h3>
<p>Check reports and system data.</p>
</div>

</div>

</body>

</html>
