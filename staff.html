<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Staff Dashboard</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f6f9;
}

header{
background:#16a085;
color:white;
padding:15px;
text-align:center;
font-size:24px;
}

.container{
padding:40px;
}

.card{
background:white;
padding:30px;
margin-bottom:20px;
border-radius:8px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

</style>

</head>

<body>

<header>
Staff Dashboard
</header>

<div class="container">

<div class="card">
<h3>Welcome Staff</h3>
<p>You have successfully logged in.</p>
</div>

<div class="card">
<h3>Manage Orders</h3>
<p>Check and update customer orders.</p>
</div>

<div class="card">
<h3>Customer Support</h3>
<p>Assist customers with their queries.</p>
</div>

</div>

</body>

</html>
